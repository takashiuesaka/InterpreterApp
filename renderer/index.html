<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InterpreterApp</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <button
          id="audioMuteToggleButton"
          type="button"
          class="audio-icon-button"
          aria-label="翻訳音声をミュート"
          aria-pressed="false"
          title="翻訳音声: 再生中"
        >
          <svg class="speaker-icon icon-unmuted" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 10v4h4l5 4V6l-5 4H5z" fill="currentColor" />
            <path
              d="M17.5 8.5a5 5 0 0 1 0 7"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          <svg class="speaker-icon icon-muted" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 10v4h4l5 4V6l-5 4H5z" fill="currentColor" />
            <path
              d="M4 4L20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <p>Microphone to Japanese Realtime Translation</p>
      </header>

      <section class="status" id="status">初期化中...</section>

      <section class="panel">
        <label for="targetLanguage">Target Language</label>
        <select id="targetLanguage">
          <option value="ja" selected>Japanese (ja)</option>
        </select>

        <div class="mic-monitor" aria-live="polite">
          <div class="mic-monitor-header">
            <span>Mic Input Level</span>
            <span id="micLevelValue">0%</span>
          </div>
          <div class="mic-level-track" role="meter" aria-label="Microphone input level">
            <div id="micLevelBar" class="mic-level-bar"></div>
          </div>
        </div>

        <div class="actions">
          <button id="startButton" type="button">Start Realtime Translation</button>
          <button id="stopButton" type="button" disabled>Stop</button>
          <button id="clearButton" type="button" class="secondary">Clear Output</button>
        </div>
      </section>

      <section class="panel-grid">
        <article class="panel full-width">
          <label for="translatedText">Realtime Japanese Output</label>
          <textarea id="translatedText" readonly placeholder="Microphone translation appears here..."></textarea>
        </article>

        <article class="panel full-width">
          <div class="event-log-header">
            <label for="eventLog">Realtime Event Log</label>
            <button id="clearEventLogButton" type="button" class="secondary">Clear Event Log</button>
          </div>
          <div id="eventLog" class="event-log" aria-live="polite"></div>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
