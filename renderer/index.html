<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InterpreterApp</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="header-main">
          <button
            id="audioMuteToggleButton"
            type="button"
            class="audio-icon-button"
            aria-label="翻訳音声をミュート"
            aria-pressed="false"
            title="翻訳音声: 再生中"
          >
            <svg class="speaker-icon icon-unmuted" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 10v4h4l5 4V6l-5 4H5z" fill="currentColor" />
              <path
                d="M17.5 8.5a5 5 0 0 1 0 7"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            <svg class="speaker-icon icon-muted" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 10v4h4l5 4V6l-5 4H5z" fill="currentColor" />
              <path
                d="M4 4L20 20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>

          <button
            id="settingsButton"
            type="button"
            class="audio-icon-button"
            aria-label="Open configuration"
            title="Configuration"
          >
            <svg class="settings-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M19.14 12.94a7.43 7.43 0 0 0 .05-.94 7.43 7.43 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.1 7.1 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.22-1.12.52-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.43 7.43 0 0 0-.05.94 7.43 7.43 0 0 0 .05.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.51.42 1.05.72 1.63.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.58-.22 1.12-.52 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"
                fill="currentColor"
              />
            </svg>
          </button>

          <div class="header-input-control">
            <label for="inputDevice">Input:</label>
            <select id="inputDevice" aria-label="Input device"></select>
          </div>

          <div class="header-live-controls">
            <div class="actions">
              <button id="startButton" type="button">Start</button>
              <button id="stopButton" type="button" disabled>Stop</button>
            </div>

            <div class="mic-monitor" aria-live="polite">
              <div class="mic-monitor-header">
                <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 3a3 3 0 0 1 3 3v5a3 3 0 0 1-6 0V6a3 3 0 0 1 3-3zm-7 8a1 1 0 0 1 2 0 5 5 0 0 0 10 0 1 1 0 1 1 2 0 7 7 0 0 1-6 6.93V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-3.07A7 7 0 0 1 5 11z"
                    fill="currentColor"
                  />
                </svg>
                <span id="micLevelValue">0%</span>
              </div>
              <div class="mic-level-track" role="meter" aria-label="Microphone input level">
                <div id="micLevelBar" class="mic-level-bar"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="header-controls">
          <label for="targetLanguage">Target:</label>
          <select id="targetLanguage">
            <option value="ja" selected>Japanese</option>
          </select>
        </div>
      </header>

      <section class="status" id="status">初期化中...</section>

      <div class="panel-restore-bar" id="panelRestoreBar" hidden>
        <span>Hidden panel:</span>
        <button id="showTranslationPanelButton" type="button" class="secondary" hidden>
          Show Translation
        </button>
        <button id="showInputSttPanelButton" type="button" class="secondary" hidden>
          Show STT
        </button>
      </div>

      <section id="configModal" class="config-modal" hidden>
        <div class="config-modal-card" role="dialog" aria-modal="true" aria-labelledby="configModalTitle">
          <h2 id="configModalTitle">Configuration</h2>
          <p class="config-modal-description">Foundry 接続情報を設定してください。</p>
          <label for="configEndpointInput">FOUNDRY_ENDPOINT</label>
          <input id="configEndpointInput" type="text" autocomplete="off" />

          <label for="configDeploymentInput">FOUNDRY_DEPLOYMENT</label>
          <input id="configDeploymentInput" type="text" autocomplete="off" />

          <label for="configTenantInput">AZURE_TENANT_ID</label>
          <input id="configTenantInput" type="text" autocomplete="off" />

          <p id="configModalError" class="config-modal-error" hidden></p>

          <div class="config-modal-actions">
            <button id="configCancelButton" type="button" class="secondary">Cancel</button>
            <button id="configSaveButton" type="button">Save</button>
          </div>
        </div>
      </section>

      <section class="panel-grid">
        <article id="translationPanel" class="panel output-panel">
          <div class="output-header">
            <label for="translatedText">Realtime Output</label>
            <div class="output-actions">
              <button
                id="saveButton"
                type="button"
                class="icon-button secondary"
                aria-label="Save output"
                title="Save output"
              >
                <svg class="save-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M17 3H5c-1.11 0-2 .89-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zM12 19a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm3-10H5V5h10v4z"
                    fill="currentColor"
                  />
                </svg>
              </button>
              <button id="clearButton" type="button" class="secondary">Clear Output</button>
              <button id="closeTranslationPanelButton" type="button" class="secondary panel-close-button" aria-label="Close translation panel" title="Close translation panel">×</button>
            </div>
          </div>
          <textarea id="translatedText" readonly placeholder="Microphone translation appears here..."></textarea>
        </article>

        <article id="inputSttPanel" class="panel output-panel">
          <div class="output-header">
            <label for="inputSttText">Input Speech To Text (English)</label>
            <div class="output-actions">
              <button
                id="saveInputSttButton"
                type="button"
                class="icon-button secondary"
                aria-label="Save STT output"
                title="Save STT output"
              >
                <svg class="save-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M17 3H5c-1.11 0-2 .89-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zM12 19a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm3-10H5V5h10v4z"
                    fill="currentColor"
                  />
                </svg>
              </button>
              <button id="clearInputSttButton" type="button" class="secondary">Clear STT</button>
              <button id="closeInputSttPanelButton" type="button" class="secondary panel-close-button" aria-label="Close STT panel" title="Close STT panel">×</button>
            </div>
          </div>
          <textarea
            id="inputSttText"
            class="input-stt-text"
            readonly
            placeholder="Input speech transcription appears here..."
          ></textarea>
        </article>

        <article id="eventLogPanel" class="panel full-width">
          <div class="event-log-header">
            <label for="eventLog">Realtime Event Log</label>
            <div class="event-log-controls">
              <button id="toggleEventLogButton" type="button" class="secondary">Hide Event Log</button>
              <button id="clearEventLogButton" type="button" class="secondary">Clear Event Log</button>
            </div>
          </div>
          <div id="eventLog" class="event-log" aria-live="polite"></div>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
